services:
  postgres:
    image: postgres:16
    container_name: skillbridge_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
  
  pipeline:
    build:
      context: ./pipeline
    container_name: skillbridge_pipeline
    env_file:
      - .env
    volumes:
      - ./pipeline/src:/app/src
      - ./data:/app/data
    depends_on:
      - postgres

volumes:
  postgres_data: